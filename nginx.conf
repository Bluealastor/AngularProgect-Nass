# Configurazione nginx per il frontend Angular del NAS.
#
# Due compiti:
#   1. Serve i file statici Angular da /usr/share/nginx/html
#   2. Proxia tutte le chiamate /api/* verso l'api-gateway Spring Boot
#
# Grazie al proxy, il browser vede tutto su una sola origine (porta 80)
# e non ci sono problemi CORS tra frontend e backend.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy verso il backend ────────────────────────────────────────────────
    # Tutte le richieste che iniziano con /api/ vengono girate all'api-gateway.
    # "nas-gateway" è il nome del container Docker definito nel docker-compose.
    location /api/ {
        proxy_pass         http://nas-gateway:8080/api/;
        proxy_http_version 1.1;

        # Header necessari per streaming video (Range requests)
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Disabilita il buffering per lo streaming video:
        # nginx non aspetta di ricevere tutto il file prima di mandarlo al client.
        proxy_buffering    off;
        proxy_cache        off;

        # Timeout lunghi per file grandi (video HD/4K)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Angular routing (HTML5 history mode) ─────────────────────────────────
    # Se il file richiesto non esiste su disco (es. /video, /login, /video360),
    # nginx serve index.html e lascia che Angular gestisca la route lato client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Compressione gzip ────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/wasm image/svg+xml;
    gzip_min_length 1024;
}
